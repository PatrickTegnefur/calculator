<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT CALC</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Nunito:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #2a2a2a;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      overflow: hidden;
    }

    .device {
      width: 100%;
      background: linear-gradient(160deg, #3c3c3c 0%, #2e2e2e 60%, #282828 100%);
      border-radius: 0 0 12px 12px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 6px 20px rgba(0,0,0,0.6),
        0 2px 4px rgba(0,0,0,0.4);
      padding: 0 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      padding: 5px 4px 3px;
      gap: 6px;
    }

    .emblem {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.00);
      border: 1px solid rgba(255,255,255,0.0);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .emblem img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.75;
    }

    /*.solar {
      flex: 1;
      height: 8px;
      border-radius: 2px;
      background: repeating-linear-gradient(
        90deg,
        #1e2e1e 0px, #1e2e1e 9px,
        #2a3d2a 9px, #2a3d2a 11px
      );
      border: 1px solid #1a1a1a;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
    }
    */
    
    /* ── Display ── */
    .display-shell {
      background: #1a1a1a;
      border-radius: 4px;
      padding: 3px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.7);
    }

    .display {
      background: #3d5c30;
      border-radius: 2px;
      padding: 5px 8px;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 2px;
    }

    .expr {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(11px, 3.5vw, 15px);
      color: #c8e8a8;
      text-align: right;
      min-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0.85;
    }

    .result {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(18px, 7vw, 30px);
      color: #e8ffcc;
      text-align: right;
      text-shadow: 0 0 8px rgba(160,230,100,0.4);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Quickbar (räknesätt + = + dec) ── */
    .quickbar-shell {
      background: #1a1a1a;
      border-radius: 4px;
      padding: 3px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    }

    .quickbar {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 3px;
    }

    /* ── Main buttons ── */
    .buttons-shell {
      background: #1e1e1e;
      border-radius: 5px;
      padding: 4px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }

    /* 4 kolumner: 3 siffror + 1 operator */
    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr) 1.1fr;
      grid-template-rows: repeat(5, auto);
      gap: 3px;
    }

    /* = sträcker sig 2 rader */
    .btn-eq-tall {
      grid-row: span 2;
      background: #3a6e30;
      color: #d8ffc0;
      box-shadow: 0 2px 0 rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
      font-size: clamp(13px, 4vw, 18px);
    }
    .btn-eq-tall:active { background: #4a8e3a; }

    /* ── Gemensam knappbas ── */
    button {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(9px, 2.8vw, 13px);
      font-weight: 700;
      padding: 6px 0;
      border: none;
      cursor: pointer;
      border-radius: 3px;
      transition: filter 0.08s, transform 0.07s;
      user-select: none;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      box-shadow: 0 2px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    button:active {
      filter: brightness(1.25);
      transform: translateY(1px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.4);
    }

    /* Quickbar-knappar lite lägre */
    .quickbar button { padding: 4px 0; }

    /* Färger */
    .btn-num  { background: #3a3a3a; color: #d0d0d0; }
    .btn-op   { background: #2e3e2e; color: #8ab87a; }
    .btn-ac   { background: #3e2e2e; color: #b07070; }
    .btn-del  { background: #38362a; color: #b09850; }
    .btn-sqrt { background: #2e3038; color: #7a9ab8; }

    /* = — sticker ut tydligt */
    .btn-eq {
      background: #3a6e30;
      color: #d8ffc0;
      box-shadow: 0 2px 0 rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
      font-size: clamp(11px, 3.5vw, 16px);
    }
    .btn-eq:active { background: #4a8e3a; }

    /* Decimalknapp */
    .btn-dec { background: #2e3038; color: #7a9ab8; font-size: clamp(8px, 2.2vw, 11px); }
    .btn-dec.active { background: #3a4858; color: #aad4f8; box-shadow: 0 0 0 1px #5a8ab8, inset 0 1px 0 rgba(255,255,255,0.1); }

    .btn-zero { grid-column: span 2; }
  </style>
</head>
<body>
<div class="device">

  <div class="topbar">
    <div class="emblem">
      <img src="AD_pippi_vit.svg" alt="Skolans logo">
      
    </div>
    <div class="emblem">
      
    </div>
    <div class="solar"></div>
  </div>

  <div class="display-shell">
    <div class="display">
      <div class="expr"   id="expr"></div>
      <div class="result" id="result">0</div>
    </div>
  </div>

  <!-- Snabbrad: räknesätt, =, decimaler -->
  <div class="quickbar-shell">
    <div class="quickbar">
      <button class="btn-op"  onclick="op('+')">+</button>
      <button class="btn-op"  onclick="op('-')">−</button>
      <button class="btn-op"  onclick="op('*')">×</button>
      <button class="btn-op"  onclick="op('/')">÷</button>
      <button class="btn-eq"  onclick="eq()">=</button>
      <button class="btn-dec" id="decBtn" onclick="toggleDec()">,00</button>
    </div>
  </div>

  <!-- Huvudknappsats: 3 sifferkol + 1 operatorkol, = tar 2 rader -->
  <div class="buttons-shell">
    <div class="buttons">
      <button class="btn-ac"   onclick="ac()">AC</button>
      <button class="btn-del"  onclick="del()">⌫</button>
      <button class="btn-sqrt" onclick="sqrt()">√</button>
      <button class="btn-op"   onclick="op('/')">÷</button>

      <button class="btn-num" onclick="num('7')">7</button>
      <button class="btn-num" onclick="num('8')">8</button>
      <button class="btn-num" onclick="num('9')">9</button>
      <button class="btn-op"  onclick="op('*')">×</button>

      <button class="btn-num" onclick="num('4')">4</button>
      <button class="btn-num" onclick="num('5')">5</button>
      <button class="btn-num" onclick="num('6')">6</button>
      <button class="btn-op"  onclick="op('-')">−</button>

      <button class="btn-num" onclick="num('1')">1</button>
      <button class="btn-num" onclick="num('2')">2</button>
      <button class="btn-num" onclick="num('3')">3</button>
      <button class="btn-eq-tall btn-eq" onclick="eq()">=</button>

      <button class="btn-num" style="grid-column:span 2" onclick="num('0')">0</button>
      <button class="btn-num" onclick="comma()">,</button>
    </div>
  </div>

</div>
<script>
  let expr        = '';
  let afterEq     = false;
  let lastResult  = '';
  let rawLast     = null;          // spara råvärdet för precision-toggle
  let fullPrecision = false;

  const exprEl   = document.getElementById('expr');
  const resultEl = document.getElementById('result');
  const decBtn   = document.getElementById('decBtn');

  function display() {
    exprEl.textContent   = expr;
    resultEl.textContent = lastResult || (expr ? '' : '0');
  }

  function fmt(n) {
    if (!isFinite(n)) return 'Fel';
    if (fullPrecision) return parseFloat(n.toPrecision(15)).toString().replace('.', ',');
    return parseFloat(n.toPrecision(6)).toString().replace('.', ',');
  }

  function toggleDec() {
    fullPrecision = !fullPrecision;
    decBtn.classList.toggle('active', fullPrecision);
    decBtn.textContent = fullPrecision ? ',∞' : ',00';
    if (rawLast !== null) { lastResult = fmt(rawLast); display(); }
  }

  function num(d) {
    if (afterEq) { expr = ''; afterEq = false; lastResult = ''; rawLast = null; }
    expr += d;
    display();
  }

  function comma() {
    // Lägg alltid till komma som decimalseparator i visningen
    if (afterEq) { expr = '0,'; afterEq = false; lastResult = ''; rawLast = null; display(); return; }
    // Hitta det aktuella talet (senaste operand)
    const parts = expr.split(/[+\-*/]/);
    const cur = parts[parts.length - 1];
    if (!cur.includes(',')) {
      if (!cur) expr += '0';
      expr += ',';
    }
    display();
  }

  function op(o) {
    if (afterEq) {
      // Starta nytt uttryck från resultatet — behåll komma som separator
      expr = lastResult;
      afterEq = false; lastResult = ''; rawLast = null;
    }
    if (!expr) return;
    const last = expr[expr.length - 1];
    if (['+','-','*','/'].includes(last)) expr = expr.slice(0, -1);
    expr += o;
    display();
  }

  function ac() {
    expr = ''; afterEq = false; lastResult = ''; rawLast = null;
    display();
  }

  function del() {
    if (afterEq) { ac(); return; }
    expr = expr.slice(0, -1);
    display();
  }

  function sqrt() {
    const src = expr || (rawLast !== null ? rawLast.toString() : '0');
    const val = parseFloat(src.toString().replace(/,/g, '.'));
    if (val < 0) { lastResult = 'Fel'; rawLast = null; expr = '√(' + expr + ')'; afterEq = true; display(); return; }
    rawLast = Math.sqrt(val);
    lastResult = fmt(rawLast);
    expr = '√(' + expr + ')';
    afterEq = true;
    display();
  }

  function eq() {
    if (!expr) return;
    try {
      // Normalisera: ersätt komma och visningssymboler med JS-syntax
      const js = expr.replace(/,/g, '.').replace(/×/g, '*').replace(/÷/g, '/');
      // Division med exakt noll — men INTE om divisorn är ett decimaltal som börjar med 0
      // Kontrollera resultatet istället för att gissa på strängen
      rawLast = Function('"use strict"; return (' + js + ')')();
      if (!isFinite(rawLast)) {
        lastResult = 'Div/0'; rawLast = null; afterEq = true; display(); return;
      }
      lastResult = fmt(rawLast);
    } catch { lastResult = 'Fel'; rawLast = null; }
    afterEq = true;
    display();
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') num(e.key);
    else if (e.key === '.' || e.key === ',') comma();  // båda ger komma i uttrycket
    else if (e.key === '+') op('+');
    else if (e.key === '-') op('-');
    else if (e.key === '*') op('*');
    else if (e.key === '/') { e.preventDefault(); op('/'); }
    else if (e.key === 'Enter' || e.key === '=') eq();
    else if (e.key === 'Backspace') del();
    else if (e.key === 'Escape') ac();
  });
</script>
</body>
</html>
